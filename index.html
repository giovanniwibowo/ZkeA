<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dari Z ke A">
<meta name="format-detection" content="telephone=no">
<title>Dari Z ke A</title>
<style>
:root{
  --white:#FFFFFF;--card:#FFFDF8;--shadow:rgba(0,0,0,0.18);
  --radius:24px;
  font-family:'Trebuchet MS','Comic Sans MS','Chalkboard SE',cursive;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;background:#0d1b2a;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px);}

.screen{position:absolute;top:0;left:0;right:0;bottom:0;display:none;overflow:hidden;overflow-y:hidden;-webkit-overflow-scrolling:auto;}
.screen.active{display:-webkit-flex;display:flex;}

/* ====== SPLASH ====== */
#splash{background:linear-gradient(160deg,#0d1b2a 0%,#1b3a5c 50%,#0e6655 100%);align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.splash-stars{position:absolute;inset:0;pointer-events:none;}
.sstar{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,2s) ease-in-out infinite var(--dl,0s);}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:1;transform:scale(1.6)}}
.splash-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;animation:floatY 3s ease-in-out infinite;}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.splash-title{font-size:clamp(36px,8vw,72px);color:#fff;text-shadow:0 4px 20px rgba(100,200,255,.5),3px 3px 0 rgba(0,0,0,.35);text-align:center;line-height:1.1;letter-spacing:1px;}
.splash-subtitle{font-size:clamp(13px,2.5vw,20px);color:rgba(255,255,255,.7);text-align:center;letter-spacing:2px;}
.splash-tagline{font-size:clamp(12px,2vw,17px);color:rgba(255,255,255,.5);text-align:center;}
.start-btn{background:linear-gradient(135deg,#f7971e,#ffd200);color:#fff;border:none;border-radius:50px;padding:clamp(14px,3vw,22px) clamp(36px,8vw,64px);font-size:clamp(18px,4vw,28px);cursor:pointer;font-family:inherit;font-weight:700;box-shadow:0 8px 0 rgba(0,0,0,.25),0 0 40px rgba(255,200,0,.25);letter-spacing:.5px;margin-top:8px;}
.start-btn:active{transform:translateY(5px);box-shadow:0 3px 0 rgba(0,0,0,.25);}
.splash-ver{position:absolute;bottom:16px;color:rgba(255,255,255,.25);font-size:11px;}

/* ====== HOME ====== */
#home{flex-direction:column;background:linear-gradient(160deg,#0d1b2a,#1b3a5c 55%,#0e4d3a);}
.home-header{padding:clamp(16px,3vw,28px) clamp(16px,3vw,28px) 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.home-logo{display:flex;align-items:center;gap:10px;}
.home-logo-text{font-size:clamp(22px,4.5vw,38px);color:#ffd200;text-shadow:2px 2px 8px rgba(255,210,0,.35);font-weight:900;letter-spacing:1px;}
.home-logo-sub{font-size:clamp(10px,1.8vw,14px);color:rgba(255,255,255,.5);letter-spacing:2px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.total-stars{background:rgba(255,210,0,.15);border:2px solid rgba(255,210,0,.3);border-radius:50px;padding:7px 16px;color:#ffd200;font-size:clamp(13px,2.2vw,18px);font-weight:700;}
.music-btn{background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.2);border-radius:50%;width:clamp(38px,6vw,50px);height:clamp(38px,6vw,50px);font-size:clamp(16px,2.8vw,22px);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.music-btn:active{transform:scale(.88);}
.music-btn.muted{background:rgba(255,80,80,.2);border-color:rgba(255,80,80,.35);}

/* Hero banner */
.home-hero{flex-shrink:0;padding:0 clamp(16px,3vw,28px);margin-top:12px;}
.hero-card{background:linear-gradient(120deg,rgba(255,255,255,.08),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:12px 18px;display:flex;align-items:flex-end;gap:0;overflow:hidden;position:relative;min-height:clamp(110px,18vw,160px);}
.hero-text{flex:1;z-index:2;}
.hero-text h2{font-size:clamp(14px,2.8vw,22px);color:#fff;font-weight:800;line-height:1.3;}
.hero-text p{font-size:clamp(10px,1.8vw,14px);color:rgba(255,255,255,.6);margin-top:4px;line-height:1.4;}
.hero-svg-wrap{flex-shrink:0;height:clamp(100px,17vw,155px);display:flex;align-items:flex-end;}

.levels-scroll{-webkit-flex:1;flex:1;overflow-y:auto;overflow-x:hidden;padding:clamp(12px,2.5vw,22px);-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.levels-scroll::-webkit-scrollbar{display:none;}
.section-label{color:rgba(255,255,255,.55);font-size:clamp(10px,1.8vw,13px);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;margin-top:4px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.12);}
.levels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(100px,18vw,148px),1fr));gap:clamp(8px,1.8vw,16px);margin-bottom:16px;}

.level-card{background:var(--card);border-radius:20px;padding:clamp(10px,2vw,18px);display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;box-shadow:0 5px 0 var(--shadow);transition:transform .12s,box-shadow .12s;position:relative;border:3px solid transparent;min-height:clamp(100px,16vw,140px);justify-content:center;}
.level-card:active{transform:translateY(4px);box-shadow:0 1px 0 var(--shadow);}
.level-card.completed{border-color:#2ECC71;}
.level-card.completed::after{content:"✓";position:absolute;top:7px;right:9px;font-size:14px;color:#2ECC71;font-weight:900;}
.lc-badge{position:absolute;top:-8px;left:50%;transform:translateX(-50%);color:#fff;font-size:9px;padding:3px 9px;border-radius:20px;white-space:nowrap;font-weight:700;}
.lc-icon{font-size:clamp(26px,5vw,42px);line-height:1;}
.lc-num{font-size:clamp(8px,1.4vw,11px);color:#aaa;font-weight:700;letter-spacing:1px;}
.lc-name{font-size:clamp(9px,1.6vw,13px);color:#444;font-weight:700;text-align:center;line-height:1.3;}
.lc-stars{font-size:11px;color:#ffd200;min-height:14px;}
.add-card{background:rgba(255,255,255,.05);border:2px dashed rgba(255,255,255,.18);border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;min-height:clamp(100px,16vw,140px);}
.add-card span{color:rgba(255,255,255,.35);font-size:clamp(9px,1.6vw,12px);text-align:center;}

/* ====== GAME ====== */
#game{flex-direction:column;}
.game-bg{position:absolute;inset:0;transition:background .4s;}
.game-top{position:relative;z-index:10;display:flex;align-items:center;padding:clamp(10px,2vw,16px) clamp(12px,2.5vw,22px);gap:10px;background:rgba(0,0,0,.2);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.home-ico{background:rgba(255,255,255,.9);border:none;border-radius:50%;width:clamp(40px,6.5vw,52px);height:clamp(40px,6.5vw,52px);font-size:clamp(17px,2.8vw,22px);cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.home-ico:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.2);}
.game-title-bar{color:#fff;font-size:clamp(13px,2.5vw,20px);font-weight:700;text-shadow:1px 1px 5px rgba(0,0,0,.4);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.score-pill{background:rgba(255,210,0,.9);border-radius:50px;padding:clamp(5px,1vw,9px) clamp(12px,2.2vw,20px);font-size:clamp(13px,2.2vw,18px);font-weight:700;color:#3d2000;box-shadow:0 3px 0 rgba(0,0,0,.2);white-space:nowrap;}
.progress-wrap{position:relative;z-index:10;padding:0 clamp(12px,2.5vw,22px) 5px;background:rgba(0,0,0,.18);}
.progress-track{height:9px;background:rgba(255,255,255,.18);border-radius:9px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,#ffd200,#f7971e);border-radius:9px;transition:width .5s cubic-bezier(.34,1.56,.64,1);}
.game-body{position:relative;z-index:5;-webkit-flex:1;flex:1;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;padding:clamp(10px,2vw,20px);gap:clamp(8px,1.8vw,16px);overflow:hidden;}

/* Question card */
.q-card{background:rgba(255,255,255,.97);border-radius:var(--radius);padding:clamp(14px,2.8vw,26px);text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.22);width:100%;max-width:680px;}
.q-text{font-size:clamp(15px,3.2vw,26px);color:#1b2a3b;line-height:1.4;}
.q-emoji{font-size:clamp(48px,10vw,88px);display:block;line-height:1.1;margin:6px 0;}
.q-sub{font-size:clamp(11px,1.8vw,15px);color:#888;margin-top:4px;}

/* Flag display */
.flag-display{font-size:clamp(64px,14vw,110px);display:block;text-align:center;line-height:1;margin:4px 0;}

/* Options */
.opts{display:grid;gap:clamp(7px,1.5vw,13px);width:100%;max-width:680px;}
.g2{grid-template-columns:1fr 1fr;}
.g3{grid-template-columns:1fr 1fr 1fr;}
.g4{grid-template-columns:1fr 1fr;}
.opt{background:rgba(255,255,255,.97);border:4px solid transparent;border-radius:18px;padding:clamp(9px,1.8vw,18px) 8px;cursor:pointer;text-align:center;box-shadow:0 4px 0 rgba(0,0,0,.13);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-height:clamp(60px,11vw,96px);transition:transform .1s;}
.opt:active{transform:scale(.92);}
.opt.correct{background:#E8F5E9;border-color:#4CAF50;-webkit-animation:popOk .45s ease;animation:popOk .45s ease;}
.opt.wrong{background:#FFEBEE;border-color:#F44336;-webkit-animation:shk .38s ease;animation:shk .38s ease;}
@-webkit-keyframes popOk{0%{-webkit-transform:scale(1)}50%{-webkit-transform:scale(1.09)}100%{-webkit-transform:scale(1)}}
@keyframes popOk{0%{transform:scale(1)}50%{transform:scale(1.09)}100%{transform:scale(1)}}
@-webkit-keyframes shk{0%,100%{-webkit-transform:translateX(0)}25%{-webkit-transform:translateX(-9px)}75%{-webkit-transform:translateX(9px)}}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}
.opt .oe{font-size:clamp(24px,5vw,46px);}
.opt .ot{font-size:clamp(11px,2vw,17px);color:#222;font-weight:700;line-height:1.25;}
.opt .os{font-size:clamp(9px,1.5vw,13px);color:#888;}

/* Size compare */
.size-row{display:flex;gap:clamp(14px,4vw,36px);justify-content:center;align-items:flex-end;}
.sz-opt{background:rgba(255,255,255,.96);border:4px solid transparent;border-radius:18px;padding:clamp(10px,2.5vw,22px) clamp(14px,3vw,30px);cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.14);display:flex;align-items:center;justify-content:center;transition:transform .1s;}
.sz-opt:active{transform:scale(.92);}
.sz-opt.correct{background:#E8F5E9;border-color:#4CAF50;animation:popOk .45s ease;}
.sz-opt.wrong{background:#FFEBEE;border-color:#F44336;animation:shk .38s ease;}

/* Counting */
.count-items{display:flex;flex-wrap:wrap;justify-content:center;gap:clamp(5px,1.2vw,10px);max-width:560px;}
.ci{font-size:clamp(26px,5.5vw,48px);cursor:pointer;transition:transform .14s,filter .18s;}
.ci.tapped{filter:grayscale(1) opacity(.3);transform:scale(.8);}
.hint-bar{font-size:clamp(11px,1.8vw,15px);color:rgba(255,255,255,.85);background:rgba(0,0,0,.18);border-radius:10px;padding:7px 16px;text-align:center;max-width:480px;}

/* Drawing */
.color-pal{display:flex;flex-wrap:wrap;gap:clamp(7px,1.5vw,12px);justify-content:center;}
.cp{width:clamp(34px,5.5vw,48px);height:clamp(34px,5.5vw,48px);border-radius:50%;cursor:pointer;border:4px solid transparent;box-shadow:0 3px 0 rgba(0,0,0,.2);transition:transform .1s;}
.cp.sel{border-color:#111;transform:scale(1.22);}
.canvas-wrap{background:#fff;border-radius:18px;box-shadow:0 6px 24px rgba(0,0,0,.18);overflow:hidden;touch-action:none;}
canvas{display:block;}
.draw-actions{display:flex;gap:10px;align-items:center;}
.btn-clr{background:#FF6B6B;color:#fff;border:none;border-radius:50px;padding:clamp(8px,1.6vw,13px) clamp(16px,3vw,26px);font-size:clamp(12px,2vw,17px);cursor:pointer;font-family:inherit;font-weight:700;box-shadow:0 3px 0 #c0392b;}
.btn-clr:active{transform:translateY(3px);box-shadow:0 1px 0 #c0392b;}
.btn-done-draw{background:linear-gradient(135deg,#27ae60,#2ecc71);color:#fff;border:none;border-radius:50px;padding:clamp(8px,1.6vw,13px) clamp(20px,4vw,36px);font-size:clamp(13px,2.2vw,19px);cursor:pointer;font-family:inherit;font-weight:700;box-shadow:0 3px 0 #1a7a2a;}
.btn-done-draw:active{transform:translateY(3px);box-shadow:0 1px 0 #1a7a2a;}

/* Feedback */
#feedback{display:none;position:fixed;top:0;left:0;width:100%;height:100%;align-items:center;justify-content:center;z-index:500;pointer-events:none;}
.fb-box{background:rgba(255,255,255,.97);border-radius:28px;padding:clamp(22px,4.5vw,38px) clamp(30px,6vw,52px);text-align:center;box-shadow:0 20px 70px rgba(0,0,0,.3);-webkit-transform:scale(0);transform:scale(0);-webkit-animation:fbPop .4s cubic-bezier(.34,1.56,.64,1) forwards;animation:fbPop .4s cubic-bezier(.34,1.56,.64,1) forwards;}
@-webkit-keyframes fbPop{to{-webkit-transform:scale(1)}}
@keyframes fbPop{to{transform:scale(1)}}
.fb-emoji{font-size:clamp(58px,12vw,88px);}
.fb-text{font-size:clamp(18px,3.8vw,30px);color:#1b2a3b;margin-top:8px;font-weight:700;}
.fb-pts{font-size:clamp(12px,2.2vw,18px);color:#888;margin-top:4px;}

/* Completion */
#completion{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(160deg,#0d1b2a,#1b3a5c,#0e6655);display:none;flex-direction:column;align-items:center;justify-content:center;gap:clamp(10px,2.2vw,20px);padding:clamp(20px,4.5vw,44px);z-index:600;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.comp-title{font-size:clamp(28px,6.5vw,60px);color:#fff;text-shadow:0 4px 20px rgba(255,200,0,.4),3px 3px 0 rgba(0,0,0,.25);text-align:center;animation:floatY 2s ease-in-out infinite;}
.comp-stars{display:flex;gap:clamp(8px,2vw,18px);}
.comp-star{font-size:clamp(44px,9vw,72px);animation:sBurst .5s cubic-bezier(.34,1.56,.64,1) backwards;}
.comp-star:nth-child(1){animation-delay:.15s}.comp-star:nth-child(2){animation-delay:.32s}.comp-star:nth-child(3){animation-delay:.5s}
@keyframes sBurst{from{transform:scale(0) rotate(-35deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.comp-score{color:rgba(255,255,255,.9);font-size:clamp(14px,3vw,24px);text-align:center;background:rgba(255,255,255,.1);border-radius:18px;padding:10px 24px;}
.comp-badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.comp-badge{background:rgba(255,255,255,.14);border:2px solid rgba(255,255,255,.28);border-radius:50px;padding:7px 16px;color:#fff;font-size:clamp(11px,1.8vw,15px);}
.comp-btns{display:flex;gap:clamp(8px,2vw,18px);flex-wrap:wrap;justify-content:center;margin-top:6px;}
.btn-next{background:linear-gradient(135deg,#ffd200,#f7971e);color:#fff;border:none;border-radius:50px;padding:clamp(12px,2.2vw,19px) clamp(26px,5.5vw,48px);font-size:clamp(15px,2.8vw,22px);cursor:pointer;font-family:inherit;font-weight:700;box-shadow:0 5px 0 rgba(0,0,0,.22);}
.btn-next:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(0,0,0,.22);}
.btn-replay,.btn-home2{border:none;border-radius:50px;padding:clamp(12px,2.2vw,19px) clamp(20px,4vw,36px);font-size:clamp(14px,2.5vw,20px);cursor:pointer;font-family:inherit;font-weight:700;}
.btn-replay{background:rgba(255,255,255,.17);color:#fff;border:2px solid rgba(255,255,255,.35);}
.btn-home2{background:rgba(255,255,255,.1);color:rgba(255,255,255,.75);border:2px solid rgba(255,255,255,.22);}

/* Add Modal */
#addModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;z-index:700;padding:20px;}
.modal-box{background:#fff;border-radius:var(--radius);padding:clamp(18px,3.8vw,34px);width:100%;max-width:540px;max-height:82vh;overflow-y:auto;}
.modal-title{font-size:clamp(16px,3.2vw,26px);color:#1b2a3b;margin-bottom:18px;text-align:center;font-weight:800;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.topic-btn{background:#f4f4f4;border:3px solid transparent;border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;font-family:inherit;font-size:clamp(11px,1.8vw,15px);color:#333;font-weight:700;}
.topic-btn:active,.topic-btn.sel{background:#EDE7F6;border-color:#7c3aed;color:#5b21b6;}
.topic-btn .ti{font-size:clamp(22px,4vw,34px);display:block;margin-bottom:5px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;}
.btn-cancel{background:#eee;border:none;border-radius:50px;padding:11px 22px;font-size:clamp(13px,2.2vw,17px);cursor:pointer;font-family:inherit;font-weight:700;color:#777;}
.btn-add-modal{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border:none;border-radius:50px;padding:11px 26px;font-size:clamp(13px,2.2vw,17px);cursor:pointer;font-family:inherit;font-weight:700;box-shadow:0 4px 0 rgba(0,0,0,.18);}

/* Confetti */
.cf{position:fixed;width:10px;height:10px;border-radius:2px;animation:cfFall var(--d,2s) ease-in forwards;pointer-events:none;z-index:800;}
@keyframes cfFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(13,27,42,.96);color:#fff;border-radius:50px;padding:11px 26px;font-size:clamp(13px,2.2vw,17px);z-index:900;transition:transform .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;}
.toast.show{-webkit-transform:translateX(-50%) translateY(0);transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
  <div class="splash-stars" id="splashStars"></div>
  <div class="splash-logo-wrap">
    <svg width="clamp(120px,22vw,180px)" height="clamp(80px,14vw,120px)" viewBox="0 0 180 120" style="width:clamp(120px,22vw,180px);height:auto;">
      <!-- Globe -->
      <circle cx="90" cy="60" r="52" fill="#1a6b8a" stroke="#4fc3f7" stroke-width="3"/>
      <ellipse cx="90" cy="60" rx="22" ry="52" fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity=".6"/>
      <line x1="38" y1="60" x2="142" y2="60" stroke="#4fc3f7" stroke-width="1.5" opacity=".6"/>
      <ellipse cx="90" cy="60" rx="52" ry="20" fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity=".4"/>
      <!-- Continents simplified -->
      <path d="M68 45 Q75 38 85 42 Q90 38 96 44 Q100 40 108 45 Q112 52 105 58 Q95 55 88 58 Q78 56 70 52 Z" fill="#2e7d32" opacity=".85"/>
      <path d="M50 65 Q58 60 64 64 Q68 60 74 65 Q72 72 65 74 Q56 72 50 68 Z" fill="#388e3c" opacity=".85"/>
      <path d="M110 55 Q120 52 128 58 Q130 65 124 68 Q116 66 112 62 Z" fill="#1b5e20" opacity=".85"/>
      <!-- Star on top -->
      <polygon points="90,6 93,14 102,14 95,19 98,28 90,22 82,28 85,19 78,14 87,14" fill="#ffd200" opacity=".95"/>
    </svg>
    <div class="splash-title">Dari Z ke A</div>
    <div class="splash-subtitle">✦ JELAJAHI DUNIA ✦</div>

// STATE
// ============================================================
let state={activeLevelIds:BUILT_IN_LEVELS.map(l=>l.id),progress:{},totalStars:0};
let curLevel=null,curQ=0,curScore=0,totalQs=0,qAnswered=false;
let drawColor='#e74c3c',drawCtx=null,tappedSet=new Set(),selectedTopic=null;

function loadState(){
  try{
    var s=null;
    try{s=localStorage.getItem('darizka_v3');}catch(e){}
    if(s){var parsed=JSON.parse(s);state.activeLevelIds=parsed.activeLevelIds||state.activeLevelIds;state.progress=parsed.progress||{};state.totalStars=parsed.totalStars||0;}
  }catch(e){console.log('loadState error:',e);}
  updateTotalStars();
}
function saveState(){
  try{localStorage.setItem('darizka_v3',JSON.stringify(state));}catch(e){
    // iOS private mode: silently ignore
  }
}
function updateTotalStars(){
  state.totalStars=Object.values(state.progress).reduce((a,p)=>a+(p.stars||0),0);
  const el=document.getElementById('totalStarsDisplay');if(el)el.textContent=state.totalStars;
}

// ============================================================
// SCREENS
// ============================================================
function switchScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){
    s.classList.remove('active');
    s.style.display='none';
  });
  var el=document.getElementById(id);
  el.classList.add('active');
  // Force correct display type per screen
  var flexScreens=['splash','home','game'];
  if(flexScreens.indexOf(id)>=0){
    el.style.display='-webkit-flex';
    el.style.display='flex';
  } else {
    el.style.display='block';
  }
}
function showHome(){switchScreen('home');buildLevels();}

function buildLevels(){
  const scroll=document.getElementById('levelsScroll');scroll.innerHTML='';
  const sections=[
    {label:'🏳️ Bendera Dunia',ids:['f1','f2','asean1']},
    {label:'🗼 Destinasi & Kota Dunia',ids:['d1','c1']},
    {label:'🇮🇩 Indonesia',ids:['i1','i2']},
    {label:'🍜 Kuliner Indonesia',ids:['mk1','mk2']},
  ];
  const allActive=getAllLevels();
  const usedIds=new Set(['f1','f2','asean1','d1','c1','i1','i2','mk1','mk2']);
  const extras=allActive.filter(l=>!usedIds.has(l.id));

  sections.forEach(sec=>{
    const lvs=sec.ids.map(id=>allActive.find(l=>l.id===id)).filter(Boolean);
    if(!lvs.length) return;
    const lbl=mkEl('div','section-label');lbl.textContent=sec.label;scroll.appendChild(lbl);
    const grid=mkEl('div','levels-grid');
    lvs.forEach((lv,gi)=>{
      const prog=state.progress[lv.id]||{stars:0};
      const card=mkEl('div','level-card'+(prog.stars>0?' completed':''));
      card.innerHTML=`<div class="lc-badge" style="background:${lv.color}">${lv.age}</div>
        <div class="lc-icon">${lv.icon}</div>
        <div class="lc-num">${lv.name}</div>
        <div class="lc-stars">${'⭐'.repeat(prog.stars||0)}${'·'.repeat(3-(prog.stars||0))}</div>`;
      card.onclick=()=>startLevel(lv.id);grid.appendChild(card);
    });
    scroll.appendChild(grid);
  });

  if(extras.length){
    const lbl=mkEl('div','section-label');lbl.textContent='✨ Level Tambahan';scroll.appendChild(lbl);
    const grid=mkEl('div','levels-grid');
    extras.forEach(lv=>{
      const prog=state.progress[lv.id]||{stars:0};
      const card=mkEl('div','level-card'+(prog.stars>0?' completed':''));
      card.innerHTML=`<div class="lc-badge" style="background:${lv.color}">${lv.age}</div>
        <div class="lc-icon">${lv.icon}</div>
        <div class="lc-num">${lv.name}</div>
        <div class="lc-stars">${'⭐'.repeat(prog.stars||0)}${'·'.repeat(3-(prog.stars||0))}</div>`;
      card.onclick=()=>startLevel(lv.id);grid.appendChild(card);
    });
    const addCard=mkEl('div','add-card');
    addCard.innerHTML=`<span style="font-size:clamp(26px,5vw,40px);color:rgba(255,255,255,.35)">＋</span><span>Tambah Level</span>`;
    addCard.onclick=openAddModal;grid.appendChild(addCard);
    scroll.appendChild(grid);
  } else {
    const grid=mkEl('div','levels-grid');
    const addCard=mkEl('div','add-card');
    addCard.innerHTML=`<span style="font-size:clamp(26px,5vw,40px);color:rgba(255,255,255,.35)">＋</span><span>Tambah Level</span>`;
    addCard.onclick=openAddModal;grid.appendChild(addCard);
    scroll.appendChild(grid);
  }
  document.getElementById('totalStarsDisplay').textContent=state.totalStars;
}

function getAllLevels(){
  return state.activeLevelIds.map(id=>BUILT_IN_LEVELS.find(l=>l.id===id)||EXTRA_LEVEL_BANK.find(l=>l.id===id)).filter(Boolean);
}

// ============================================================
// GAME
// ============================================================
function startLevel(id){
  const all=getAllLevels();curLevel=all.find(l=>l.id===id);if(!curLevel)return;
  curQ=0;curScore=0;qAnswered=false;
  totalQs=curLevel.type==='drawing'?curLevel.prompts.length:curLevel.questions.length;
  switchScreen('game');
  document.getElementById('gameBg').style.background=`linear-gradient(160deg,${curLevel.color}cc 0%,${curLevel.color}44 55%,#0d1b2a 100%)`;
  document.getElementById('gameTitleBar').textContent=`${curLevel.icon} ${curLevel.name}`;
  updateHUD();renderQ();sfxPlay('levelstart');
}

function updateHUD(){
  document.getElementById('scoreDisplay').textContent=curScore;
  document.getElementById('progressBar').style.width=Math.round(curQ/totalQs*100)+'%';
}

function renderQ(){
  hideFB();qAnswered=false;tappedSet.clear();
  const body=document.getElementById('gameBody');body.innerHTML='';
  if(curQ>=totalQs){showCompletion();return;}
  const lv=curLevel,q=lv.questions[curQ];
  if(lv.type==='flag')renderFlag(body,q);
  else if(lv.type==='city_flag')renderCityFlag(body,q);
  else if(lv.type==='food')renderFood(body,q);
  else renderBasic(body,q);
}

function mkEl(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;}

function renderFlag(body,q){
  const qc=mkEl('div','q-card',`<div class="q-text">${q.q}</div><span class="flag-display">${q.flag}</span>`);
  body.appendChild(qc);
  const grid=mkEl('div','opts g2');
  q.choices.forEach(ch=>{
    const b=mkEl('button','opt',`<span class="ot">${ch}</span>`);
    b.onclick=()=>{if(!qAnswered)onAnswer(b,ch===q.correct);};
    grid.appendChild(b);
  });
  body.appendChild(grid);
}

function renderCityFlag(body,q){
  const qc=mkEl('div','q-card',`<div class="q-text">${q.q}</div><span class="flag-display">${q.flag}</span>`);
  body.appendChild(qc);
  const grid=mkEl('div','opts g2');
  q.choices.forEach(ch=>{
    const b=mkEl('button','opt',`<span class="ot">${ch}</span>`);
    b.onclick=()=>{if(!qAnswered)onAnswer(b,ch===q.correct);};
    grid.appendChild(b);
  });
  body.appendChild(grid);
}

function renderFood(body,q){
  const qc=mkEl('div','q-card',`<div class="q-text">${q.q}</div><span class="q-emoji">${q.emoji}</span><div class="q-sub">${q.desc}</div>`);
  body.appendChild(qc);
  const grid=mkEl('div','opts g2');
  q.choices.forEach(ch=>{
    const b=mkEl('button','opt',`<span class="ot">${ch}</span>`);
    b.onclick=()=>{if(!qAnswered)onAnswer(b,ch===q.correct);};
    grid.appendChild(b);
  });
  body.appendChild(grid);
}

function renderBasic(body,q){
  const qc=mkEl('div','q-card',`<div class="q-text">${q.q}</div>`);
  body.appendChild(qc);
  const grid=mkEl('div','opts g2');
  q.items.forEach((it,i)=>{
    const hasLabel=q.labels&&q.labels[i];
    const b=mkEl('button','opt',`<span class="oe">${it}</span>${hasLabel?`<span class="ot">${q.labels[i]}</span>`:''}`);
    b.onclick=()=>{if(!qAnswered)onAnswer(b,i===q.ci);};
    grid.appendChild(b);
  });
  body.appendChild(grid);
}

function onAnswer(btn,correct){
  qAnswered=true;
  if(correct){
    btn.classList.add('correct');curScore++;updateHUD();
    showFB(true,getRandGood(),'+1 ⭐');
    setTimeout(()=>{curQ++;renderQ();},1400);
  } else {
    btn.classList.add('wrong');showFB(false,getRandBad(),'');
    setTimeout(()=>{btn.classList.remove('wrong');hideFB();qAnswered=false;},950);
  }
}

const GOODS=['Benar! 🌟','Hebat! 🎉','Pintar! ✨','Luar biasa! 🏆','Bagus! 🎊','Keren! 💫','Mantap! 🥳','Tepat sekali! 🎯'];
const BADS=['Coba lagi ya! 💪','Hampir! 🌈','Yuk coba lagi! 🌸','Jangan menyerah! 🌻'];
const getRandGood=()=>GOODS[Math.floor(Math.random()*GOODS.length)];
const getRandBad=()=>BADS[Math.floor(Math.random()*BADS.length)];

function showFB(ok,text,pts){
  var fb=document.getElementById('feedback');
  document.getElementById('fbEmoji').textContent=ok?'🎉':'💪';
  document.getElementById('fbText').textContent=text;
  document.getElementById('fbPts').textContent=pts;
  fb.style.display='-webkit-flex';fb.style.display='flex';
  var box=fb.querySelector('.fb-box');
  box.style.webkitAnimation='none';box.style.animation='none';
  void box.offsetHeight; // force reflow
  box.style.webkitTransform='scale(0)';box.style.transform='scale(0)';
  setTimeout(function(){
    box.style.webkitAnimation='fbPop .4s cubic-bezier(.34,1.56,.64,1) forwards';
    box.style.animation='fbPop .4s cubic-bezier(.34,1.56,.64,1) forwards';
  },10);
}
function hideFB(){document.getElementById('feedback').style.display='none';}

// ============================================================
// COMPLETION
// ============================================================
function showCompletion(){
  hideFB();
  const pct=Math.round(curScore/totalQs*100);const stars=pct>=90?3:pct>=60?2:1;
  if(!state.progress[curLevel.id])state.progress[curLevel.id]={stars:0,bestScore:0,plays:0};
  const prog=state.progress[curLevel.id];
  if(stars>prog.stars)prog.stars=stars;
  if(curScore>prog.bestScore)prog.bestScore=curScore;
  prog.plays=(prog.plays||0)+1;
  updateTotalStars();saveState();
  const comp=document.getElementById('completion');comp.style.display='flex';
  const titles={3:'🏆 Petualang Sejati!',2:'⭐ Luar Biasa!',1:'💪 Terus Belajar!'};
  document.getElementById('compTitle').textContent=titles[stars];
  document.getElementById('compScore').textContent=`${curScore} dari ${totalQs} benar (${pct}%)`;
  const badges=document.getElementById('compBadges');badges.innerHTML='';
  if(prog.plays===1)badges.innerHTML+=`<span class="comp-badge">🥇 Pertama kali!</span>`;
  if(stars===3)badges.innerHTML+=`<span class="comp-badge">💯 Sempurna!</span>`;
  if(prog.plays>=3)badges.innerHTML+=`<span class="comp-badge">🔥 Rajin!</span>`;
  badges.innerHTML+=`<span class="comp-badge">⭐ ${stars} bintang</span>`;
  document.querySelectorAll('.comp-star').forEach((s,i)=>{s.style.filter=i<stars?'':'grayscale(1) opacity(.3)';});
  const allLevels=getAllLevels();const idx=allLevels.findIndex(l=>l.id===curLevel.id);const nextLv=allLevels[idx+1];
  const btn=document.getElementById('btnNext');
  if(nextLv){btn.textContent='➡️ Level Berikutnya';btn.onclick=()=>{comp.style.display='none';startLevel(nextLv.id);};}
  else{btn.textContent='🏠 Kembali ke Menu';btn.onclick=goHome;}
  launchConfetti();sfxPlay('victory');
}

function replayLevel(){document.getElementById('completion').style.display='none';startLevel(curLevel.id);}
function goHome(){document.getElementById('completion').style.display='none';hideFB();switchScreen('home');buildLevels();}
function confirmHome(){if(curQ>0){if(confirm('Kembali ke menu?'))goHome();}else goHome();}

function openAddModal(){

  if(!available.length){showToast('Semua level sudah ditambahkan! 🎉');return;}
  selectedTopic=null;

}

// ============================================================
// 🎵 MUSIC ENGINE
// ============================================================
let AC=null,musicMuted=false,bgmNodes=[],bgmPlaying=false,bgmScheduled=false,masterGain=null,bgmGain=null,sfxGain=null;

const BGM_MELODY=[
  [523.25,.5,.1],[659.25,.5,.1],[783.99,.5,.1],[1046.5,.5,.1],
  [783.99,.25,.05],[659.25,.25,.05],[523.25,1,.2],
  [392,.5,.1],[523.25,.5,.1],[659.25,.5,.1],[783.99,1,.2],
  [659.25,.25,.05],[783.99,.25,.05],[1046.5,.5,.1],[880,.5,.1],
  [783.99,.25,.05],[659.25,.25,.05],[523.25,.5,.1],[392,.5,.1],[261.63,1,.3],
  [523.25,.33,.05],[587.33,.33,.05],[659.25,.34,.1],[698.46,.5,.1],[783.99,.5,.1],[880,1,.2],
  [783.99,.5,.1],[698.46,.5,.1],[659.25,.5,.1],[587.33,.5,.1],[523.25,2,.4],
];
const BGM_BASS=[[130.81,4],[164.81,4],[174.61,4],[196,4],[130.81,4],[164.81,4],[174.61,4],[196,4]];

function initAudio(){
  if(AC)return;
  try{
    var Ctx=window.AudioContext||window.webkitAudioContext;
    if(!Ctx)return;
    AC=new Ctx();
    masterGain=AC.createGain();masterGain.gain.value=1;masterGain.connect(AC.destination);
    bgmGain=AC.createGain();bgmGain.gain.value=.28;bgmGain.connect(masterGain);
    sfxGain=AC.createGain();sfxGain.gain.value=1;sfxGain.connect(masterGain);
    // iOS: must resume after user gesture
    if(AC.state==='suspended'){AC.resume().catch(function(){});}
  }catch(e){AC=null;console.log('Audio init failed:',e);}
}
// iOS unlock: create silent buffer on first touch to unblock AudioContext
function iosUnlockAudio(){
  if(!AC)return;
  try{
    var buf=AC.createBuffer(1,1,22050);
    var src=AC.createBufferSource();src.buffer=buf;src.connect(AC.destination);src.start(0);
    if(AC.state==='suspended')AC.resume().catch(function(){});
  }catch(e){}
}

function scheduleBGM(){
  if(!AC||musicMuted||bgmScheduled)return;bgmScheduled=true;stopBGM();
  const BPM=128,beat=60/BPM;let t=AC.currentTime+.05;
  BGM_MELODY.forEach(([freq,dur,rest])=>{
    const o=AC.createOscillator(),g=AC.createGain();o.type='triangle';o.frequency.value=freq;o.connect(g);g.connect(bgmGain);
    const l=dur*beat;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.6,t+.02);g.gain.setValueAtTime(.6,t+l*.7);g.gain.linearRampToValueAtTime(0,t+l);o.start(t);o.stop(t+l+.01);bgmNodes.push(o);t+=(dur+rest)*beat;
  });
  let bt=AC.currentTime+.05;
  BGM_BASS.forEach(([freq,dur])=>{
    const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=freq;o.connect(g);g.connect(bgmGain);
    const l=dur*beat;g.gain.setValueAtTime(0,bt);g.gain.linearRampToValueAtTime(.3,bt+.05);g.gain.setValueAtTime(.3,bt+l*.8);g.gain.linearRampToValueAtTime(0,bt+l);o.start(bt);o.stop(bt+l);bgmNodes.push(o);bt+=l;
  });
  const loopLen=t-(AC.currentTime+.05);bgmPlaying=true;
  setTimeout(()=>{bgmScheduled=false;if(bgmPlaying&&!musicMuted)scheduleBGM();},loopLen*1000+200);
}

function stopBGM(){bgmNodes.forEach(n=>{try{n.stop();}catch(e){}});bgmNodes=[];bgmScheduled=false;}
function startMusic(){if(!AC)initAudio();if(!AC)return;if(AC.state==='suspended')AC.resume();bgmPlaying=true;if(!bgmScheduled)scheduleBGM();updateMusicBtns();}
function pauseMusic(){bgmPlaying=false;stopBGM();updateMusicBtns();}
function toggleMusic(){if(!AC)initAudio();musicMuted=!musicMuted;if(musicMuted)pauseMusic();else startMusic();updateMusicBtns();showToast(musicMuted?'🔇 Musik dimatikan':'🎵 Musik dinyalakan');}
function updateMusicBtns(){['musicBtnHome','musicBtnGame'].forEach(id=>{const b=document.getElementById(id);if(!b)return;b.textContent=musicMuted?'🔇':'🎵';b.classList.toggle('muted',musicMuted);});}

function sfxPlay(type){
  if(!AC||musicMuted)return;
  try{if(AC.state==='suspended')AC.resume().catch(function(){});}catch(e){}
  var t=AC.currentTime;
  if(type==='correct'){
    [[523,0],[659,.08],[784,.16],[1047,.26]].forEach(([f,d])=>{
      const o=AC.createOscillator(),g=AC.createGain();o.type='triangle';o.frequency.value=f;o.connect(g);g.connect(sfxGain);
      g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(.55,t+d+.02);g.gain.exponentialRampToValueAtTime(.001,t+d+.28);o.start(t+d);o.stop(t+d+.3);
    });
    const s=AC.createOscillator(),sg=AC.createGain();s.type='sine';s.frequency.setValueAtTime(2093,t+.28);s.frequency.linearRampToValueAtTime(2637,t+.5);s.connect(sg);sg.connect(sfxGain);sg.gain.setValueAtTime(.2,t+.28);sg.gain.exponentialRampToValueAtTime(.001,t+.55);s.start(t+.28);s.stop(t+.56);
  } else if(type==='wrong'){
    [[350,0],[280,.18]].forEach(([f,d])=>{
      const o=AC.createOscillator(),g=AC.createGain();o.type='sawtooth';o.frequency.value=f;o.connect(g);g.connect(sfxGain);
      g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(.35,t+d+.02);g.gain.exponentialRampToValueAtTime(.001,t+d+.22);o.start(t+d);o.stop(t+d+.24);
    });
  } else if(type==='tap'){
    const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(900,t);o.frequency.exponentialRampToValueAtTime(300,t+.12);o.connect(g);g.connect(sfxGain);g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.14);o.start(t);o.stop(t+.15);
  } else if(type==='levelstart'){
    [[262,0,.18],[392,.18,.18],[523,.36,.22],[659,.58,.22],[784,.8,.4]].forEach(([f,d,dur])=>{
      const o=AC.createOscillator(),g=AC.createGain();o.type='triangle';o.frequency.value=f;o.connect(g);g.connect(sfxGain);
      g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(.5,t+d+.03);g.gain.setValueAtTime(.5,t+d+dur*.75);g.gain.linearRampToValueAtTime(0,t+d+dur);o.start(t+d);o.stop(t+d+dur+.01);
    });
  } else if(type==='victory'){
    [[523,0,.2],[659,.22,.2],[784,.44,.2],[1047,.66,.45],[880,.95,.18],[784,1.15,.18],[1047,1.35,.5]].forEach(([f,d,dur])=>{
      const o=AC.createOscillator(),g=AC.createGain();o.type='triangle';o.frequency.value=f;o.connect(g);g.connect(sfxGain);
      g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(.55,t+d+.03);g.gain.setValueAtTime(.55,t+d+dur*.7);g.gain.linearRampToValueAtTime(0,t+d+dur);o.start(t+d);o.stop(t+d+dur+.01);
    });
    [2093,2637,3136].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=f;o.connect(g);g.connect(sfxGain);const d2=1.5+i*.15;g.gain.setValueAtTime(.22,t+d2);g.gain.exponentialRampToValueAtTime(.001,t+d2+.6);o.start(t+d2);o.stop(t+d2+.65);});
  }
}

function playTick(){initAudio();sfxPlay('tap');}

var musicStarted=false;
function tryStartMusic(){
  if(musicStarted)return;musicStarted=true;
  initAudio();iosUnlockAudio();
  if(!musicMuted)startMusic();
}
document.addEventListener('touchstart',tryStartMusic,{once:true,passive:true});
document.addEventListener('touchend',function iosTouchEnd(){iosUnlockAudio();document.removeEventListener('touchend',iosTouchEnd);});
document.addEventListener('mousedown',tryStartMusic,{once:true});

// Override onAnswer to add SFX
const _oa=onAnswer;
onAnswer=function(btn,correct){sfxPlay(correct?'correct':'wrong');_oa(btn,correct);};

// Fix: ensure body/html fills screen properly on iOS
(function(){
  function fixHeight(){
    var h=window.innerHeight;
    document.documentElement.style.height=h+'px';
    document.body.style.height=h+'px';
    document.querySelectorAll('.screen').forEach(function(s){s.style.height=h+'px';});
  }
  fixHeight();
  window.addEventListener('resize',fixHeight);
  window.addEventListener('orientationchange',function(){setTimeout(fixHeight,150);});
})();
